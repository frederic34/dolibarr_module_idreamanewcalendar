name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      - name: Setup PHP
        id: setup-php
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: php-parallel-lint/php-var-dump-check, parallel-lint, cs2pr, phpcs

      - name: Print PHP version
        run: echo ${{ steps.setup-php.outputs.php-version }}

      - name: Run PHPCS
        run: phpcs -q --report=checkstyle --standard=codesniffer/ruleset.xml --extensions=php --ignore=*/lib/ics-parser/*,*/tx/*,*/vendor/* . | cs2pr --graceful-warnings

      - name: Run Parallel Lint
        run: parallel-lint --exclude vendor/ .

      - name: Run VarDump Check
        run: var-dump-check --extensions php --tracy --exclude vendor/ .

      - name: Bump version and push tag
        uses: frederic34/github-dolibarr-action@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: frederic34
          RELEASE_BRANCH: main
          MODULE: idreamanewcalendar
          CLASSNAME: IDreamANewCalendar
          RELEASE_BRANCHES: main
          DEFAULT_BUMP: none
          INITIAL_VERSION: v0.0.0
          VERBOSE: true

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Bump version #none
